<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>ZRC AJANS</title>
  
    <style id="zrc-startup-loader-style">
      #zrc-startup-loader {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #151515 0%, #000000 58%, #000000 100%);
        transition: opacity 0.34s ease, visibility 0.34s ease;
      }

      #zrc-startup-loader.zrc-startup-loader-hide {
        opacity: 0;
        visibility: hidden;
      }

      #zrc-startup-loader-card {
        width: min(42vw, 230px);
        max-width: 230px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      #zrc-startup-loader-card img {
        width: 100%;
        height: auto;
        display: block;
        animation: zrcStartupLogoIn .52s ease both;
      }

      @keyframes zrcStartupLogoIn {
        from {
          opacity: 0;
          transform: translateY(8px) scale(.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      #zrc-startup-loader-line {
        width: 74px;
        height: 3px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 54, 0, 0.18);
      }

      #zrc-startup-loader-line::after {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: #ff3600;
        animation: zrcStartupLoaderMove 1s ease-in-out infinite;
      }


      #zrc-startup-loader-recovery {
        display: none;
        margin-top: 4px;
        text-align: center;
        color: rgba(255,255,255,.72);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      #zrc-startup-loader-recovery.zrc-startup-loader-recovery-show {
        display: block;
      }

      #zrc-startup-loader-recovery-title {
        font-size: 12px;
        font-weight: 900;
        color: #ffffff;
        margin-bottom: 4px;
      }

      #zrc-startup-loader-recovery-text {
        font-size: 10px;
        font-weight: 700;
        line-height: 1.45;
        margin-bottom: 10px;
      }

      .zrc-startup-loader-recovery-actions {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .zrc-startup-loader-recovery-actions button {
        height: 30px;
        border: 0;
        border-radius: 999px;
        padding: 0 12px;
        font-size: 10px;
        font-weight: 900;
        cursor: pointer;
      }

      .zrc-loader-refresh-btn {
        background: #ff3600;
        color: #ffffff;
      }

      .zrc-loader-reset-btn {
        background: rgba(255,255,255,.12);
        color: #ffffff;
      }

      @media (max-width: 720px) {
        #zrc-startup-loader-card {
          width: min(58vw, 210px);
        }
      }

      @keyframes zrcStartupLoaderMove {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(260%); }
      }
    </style>
  
    <meta name="application-name" content="ZRC" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="msapplication-TileColor" content="#ff3600" />
  
    <script id="zrc-preapp-pwa-reset">
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);

          if (params.get('zrc-reset-pwa') !== '1') return;

          try {
            window.localStorage.removeItem('zrc-ios-pwa-install-tip-dismissed');
            window.localStorage.removeItem('zrc-pwa-install-button-dismissed');
            window.sessionStorage.removeItem('zrc-pwa-install-button-session-hidden');
          } catch (storageError) {
            console.warn('ZRC PWA kayıtları temizlenemedi:', storageError);
          }

          var jobs = [];

          if ('serviceWorker' in navigator) {
            jobs.push(
              navigator.serviceWorker.getRegistrations()
                .then(function (registrations) {
                  return Promise.all(registrations.map(function (registration) {
                    return registration.unregister();
                  }));
                })
            );
          }

          if ('caches' in window) {
            jobs.push(
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (key) {
                  if (key.indexOf('zrc') !== -1 || key.indexOf('vite') !== -1) {
                    return caches.delete(key);
                  }

                  return Promise.resolve();
                }));
              })
            );
          }

          Promise.allSettled(jobs).finally(function () {
            var cleanUrl = window.location.origin + window.location.pathname;
            window.history.replaceState(null, '', cleanUrl);
            window.location.reload();
          });
        } catch (error) {
          console.warn('ZRC PWA erken reset çalışamadı:', error);
        }
      })();
    </script>
  
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="theme-color" content="#ff3600" />
    <meta name="apple-mobile-web-app-title" content="ZRC AJANS" />
  
    <link rel="icon" type="image/svg+xml" href="/favicon-zrc.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icons/zrc-mobile-home-icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/zrc-logo.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icons/zrc-mobile-home-icon-192.png" data-zrc-mobile-home-icon="true" />
</head>
  <body>
    <div id="zrc-startup-loader" aria-label="ZRC Portal yükleniyor">
      <div id="zrc-startup-loader-card">
        <img src="/zrc-app-icon.png?v=300" alt="ZRC Portal" />
        <div id="zrc-startup-loader-line"></div>
        <div id="zrc-startup-loader-recovery">
          <div id="zrc-startup-loader-recovery-title">Yükleme uzun sürdü</div>
          <div id="zrc-startup-loader-recovery-text">
            Sayfa takılı kaldıysa yenile veya PWA önbelleğini temizle.
          </div>
          <div class="zrc-startup-loader-recovery-actions">
            <button type="button" class="zrc-loader-refresh-btn" onclick="window.location.reload()">Yenile</button>
            <button type="button" class="zrc-loader-reset-btn" onclick="window.location.href='/?zrc-reset-pwa=1'">PWA Temizle</button>
          </div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  
    <script id="zrc-startup-loader-recovery-script">
      window.setTimeout(function () {
        var loader = document.getElementById('zrc-startup-loader');
        var recovery = document.getElementById('zrc-startup-loader-recovery');

        if (loader && recovery) {
          recovery.classList.add('zrc-startup-loader-recovery-show');
        }
      }, 8000);
    </script>
  </body>
</html>
