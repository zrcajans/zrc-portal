name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "antigravity/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint safety-critical modules
        run: npm run lint:safety

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
